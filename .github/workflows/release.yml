name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install tools
        run: sudo apt-get install -y shellcheck shfmt

      - name: shellcheck
        run: find vm/ -name "*.sh" -print0 | xargs -0 shellcheck

      - name: shfmt
        run: find vm/ -name "*.sh" -print0 | xargs -0 shfmt -d -i 2

  lint-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r src/backend/requirements.txt

      - name: Syntax check
        run: find src/backend -name '*.py' -print0 | xargs -0 python3 -m py_compile

      - name: Tests
        working-directory: src/backend
        run: python3 -m pytest tests/ -v

  release:
    needs: [lint-shell, lint-python]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          node-version: '20'

      - name: Build frontend
        run: cd src/frontend && npm ci && npm run build

      - name: Build tarball
        run: make build-tarball

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: nut-admin.tar.gz
          generate_release_notes: true
