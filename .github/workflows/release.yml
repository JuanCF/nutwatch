name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  check-tag-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag is on main branch
        run: |
          TAG_SHA=$(git rev-parse "${{ github.ref }}")
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main 2>/dev/null && \
             [ "$TAG_SHA" != "$(git rev-parse origin/main)" ]; then
            echo "ERROR: Tag ${{ github.ref_name }} is not on the main branch."
            echo "Push tags from commits on the main branch only."
            exit 1
          fi

  lint-shell:
    needs: [check-tag-branch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install tools
        run: sudo apt-get install -y shellcheck shfmt

      - name: shellcheck
        run: find vm/ -name "*.sh" -print0 | xargs -0 shellcheck

      - name: shfmt
        run: find vm/ -name "*.sh" -print0 | xargs -0 shfmt -d -i 2

  lint-python:
    needs: [check-tag-branch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r src/backend/requirements.txt

      - name: Syntax check
        run: find src/backend -name '*.py' -print0 | xargs -0 python3 -m py_compile

      - name: Tests
        working-directory: src/backend
        run: python3 -m pytest tests/ -v

  test-frontend:
    needs: [check-tag-branch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd src/frontend && npm ci

      - name: Unit tests
        run: cd src/frontend && npm test

  release:
    needs: [check-tag-branch, lint-shell, lint-python, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: cd src/frontend && npm ci && npm run build

      - name: Build tarball
        run: make build-tarball

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nutwatch.tar.gz
          generate_release_notes: true
