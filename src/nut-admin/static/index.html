<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NUT Admin</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1><span>NUT</span> Admin</h1>
  <nav>
    <button class="active" onclick="showSection('ups', this)">UPS Devices</button>
    <button onclick="showSection('users', this)">Users</button>
    <button onclick="showSection('notifications', this)">Notifications</button>
    <button onclick="showSection('logs', this)">Logs</button>
    <button onclick="showSection('config', this)">Config Files</button>
  </nav>
</header>

<div class="container">
  <div id="sec-ups" class="section active">
    <h2>UPS Devices</h2>
    <div id="service-status" style="margin-bottom:1rem;"></div>
    <div class="toolbar">
      <button class="primary" onclick="openUpsModal()">Add UPS</button>
      <button class="secondary" onclick="scanUps()">Scan USB</button>
      <button class="secondary" onclick="loadUps()">Refresh</button>
    </div>
    <div id="ups-grid" class="card-grid"></div>
  </div>

  <div id="sec-hooks" class="section">
    <div class="toolbar" style="justify-content:space-between;align-items:center;">
      <button class="secondary" onclick="closeHooksSection()">&larr; Back to UPS Devices</button>
      <h2 id="hooks-ups-title" style="margin:0;">Hooks</h2>
      <span></span>
    </div>
    <div id="hooks-table-wrap">
      <table>
        <thead><tr><th>Event</th><th>Has Hook</th><th>Actions</th></tr></thead>
        <tbody id="hooks-body"></tbody>
      </table>
    </div>
    <div class="info-box" style="margin-top:1rem;font-size:0.9rem;">
      <p>Scripts placed here run when this UPS triggers the corresponding event. Each script receives <code>$UPSNAME</code> and <code>$NOTIFYTYPE</code> environment variables.</p>
    </div>
  </div>

  <div id="sec-users" class="section">
    <h2>Users</h2>
    <div class="toolbar">
      <button class="primary" onclick="openUserModal()">Add User</button>
      <button class="secondary" onclick="loadUsers()">Refresh</button>
    </div>
    <div id="users-table-wrap">
      <table>
        <thead><tr><th>Username</th><th>Role</th><th>Password</th><th>Actions</th><th>Instcmds</th><th></th></tr></thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>
  </div>

  <div id="sec-notifications" class="section">
    <h2>Notifications</h2>
    <div id="notifications-form"></div>
    <div class="toolbar" style="margin-top:1rem;">
      <button class="primary" onclick="saveNotifications()">Save</button>
    </div>
  </div>

  <div id="sec-logs" class="section">
    <h2>Logs</h2>
    <div class="toolbar">
      <button class="secondary" id="log-pause" onclick="toggleLogPause()">Pause</button>
      <button class="secondary" onclick="loadRecentLogs()">Load Recent</button>
      <label style="font-size:0.85rem;color:var(--muted);display:flex;align-items:center;gap:0.3rem;">
        <input type="checkbox" id="log-autoscroll" checked> Auto-scroll
      </label>
    </div>
    <div id="log-box" class="log-box"></div>
  </div>

  <div id="sec-config" class="section">
    <h2>Config Files</h2>
    <div class="config-buttons">
      <button class="secondary" onclick="loadConfig('ups.conf')">ups.conf</button>
      <button class="secondary" onclick="loadConfig('upsd.conf')">upsd.conf</button>
      <button class="secondary" onclick="loadConfig('upsmon.conf')">upsmon.conf</button>
      <button class="secondary" onclick="loadConfig('upsd.users')">upsd.users</button>
    </div>
    <div class="toolbar">
      <button class="primary" onclick="saveConfig()">Save</button>
      <span id="config-filename" style="font-family:var(--mono);font-size:0.85rem;color:var(--muted);"></span>
    </div>
    <textarea id="config-editor" readonly></textarea>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div id="confirm-overlay" class="modal-overlay" onclick="if(event.target===this)dismissDialog(false)">
  <div class="modal confirm-modal" id="confirm-modal" role="dialog" aria-modal="true" aria-label="Confirm action" tabindex="-1"></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
